<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gene Davis — Portfolio Direction v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&family=Caveat:wght@400;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #222; font-family: 'Space Grotesk', sans-serif; }

/* Annotation style */
.anno {
  font-family: 'Caveat', cursive;
  font-size: 13px;
  color: #2563eb;
  opacity: 0.8;
  pointer-events: none;
  line-height: 1.4;
}

/* Hatch placeholder */
.hatch {
  background-image: repeating-linear-gradient(
    45deg,
    rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px,
    transparent 1px, transparent 8px
  );
  border: 1.5px dashed rgba(0,0,0,0.15);
}
</style>
</head>
<body>
<script type="text/babel">

/* ─────────────────────────────────────────────
   TOKENS
───────────────────────────────────────────── */
const T = {
  bg:        'linear-gradient(160deg, #f5f4f1 0%, #e9e7e2 60%, #dddbd5 100%)',
  bgSolid:   '#f0ede8',
  surface:   'rgba(255,255,255,0.55)',
  border:    'rgba(0,0,0,0.1)',
  borderMid: 'rgba(0,0,0,0.07)',
  ink:       '#1a1917',
  inkMid:    '#4a4843',
  inkLight:  '#8a8680',
  accent:    'oklch(48% 0.20 222)',   // electric blue
  accentBg:  'oklch(95% 0.04 222)',
  mono:      "'IBM Plex Mono', monospace",
  head:      "'Space Grotesk', sans-serif",
};

/* ─────────────────────────────────────────────
   SHARED SMALL COMPONENTS
───────────────────────────────────────────── */
function Label({ children, style = {} }) {
  return (
    <div style={{
      fontFamily: T.mono, fontSize: 9, letterSpacing: '0.12em',
      color: T.accent, textTransform: 'uppercase', ...style
    }}>{children}</div>
  );
}

function Rule({ style = {} }) {
  return <div style={{ borderTop: `1px solid ${T.border}`, ...style }} />;
}

function Tag({ children }) {
  return (
    <span style={{
      display: 'inline-block',
      border: `1px solid ${T.border}`,
      borderRadius: 3,
      padding: '3px 9px',
      fontFamily: T.mono,
      fontSize: 9,
      color: T.inkMid,
      letterSpacing: '0.06em',
    }}>{children}</span>
  );
}

/* ─────────────────────────────────────────────
   OPTION A — "Masked Type Hero"
   Name large, key word has photo punched through.
   Clean vertical scroll structure.
───────────────────────────────────────────── */
function OptionA() {
  return (
    <div style={{ width:'100%', height:'100%', background: T.bg, overflowY:'auto',
      color: T.ink, fontFamily: T.head }}>

      {/* NAV */}
      <nav style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'16px 32px', borderBottom:`1px solid ${T.border}` }}>
        <div style={{ fontFamily: T.mono, fontSize:10, color: T.accent, letterSpacing:'0.12em' }}>
          GD
        </div>
        <div style={{ display:'flex', gap:24 }}>
          {['Work','Method','About','Contact'].map(n => (
            <span key={n} style={{ fontSize:11, color: T.inkMid, letterSpacing:'0.04em' }}>{n}</span>
          ))}
        </div>
        <div style={{ fontFamily: T.mono, fontSize:9, color: T.accent,
          border:`1px solid ${T.accent}`, padding:'5px 12px', letterSpacing:'0.1em' }}>
          AVAILABLE
        </div>
      </nav>

      {/* HERO — name + masked word */}
      <section style={{ padding:'40px 32px 32px', borderBottom:`1px solid ${T.border}`,
        position:'relative', display:'flex', gap:32, alignItems:'flex-end' }}>

        {/* LEFT: name hierarchy */}
        <div style={{ flex:'0 0 auto', maxWidth:460 }}>
          <Label style={{ marginBottom:10 }}>Senior UX · Experimentation · AI Systems</Label>

          {/* NAME — large */}
          <div style={{ fontFamily: T.head, fontWeight:700, fontSize:56,
            lineHeight:0.95, letterSpacing:'-0.03em', color: T.ink, marginBottom:12 }}>
            Gene<br />Davis
          </div>

          {/* MASKED TEXT HERO WORD — "EXPERIENCE" with photo behind */}
          <div style={{ position:'relative', marginBottom:18, lineHeight:1 }}>
            <div style={{
              fontFamily: T.head, fontWeight:700, fontSize:72,
              letterSpacing:'-0.04em', lineHeight:0.9,
              /* CSS background-clip:text punches image through type */
              background: 'linear-gradient(135deg, #8bb8d4 0%, #4a7fa5 40%, #1a3a5c 100%)',
              WebkitBackgroundClip: 'text',
              WebkitTextFillColor: 'transparent',
              backgroundClip: 'text',
              display:'inline-block',
            }}>EXPERIENCE</div>
            <span className="anno" style={{ display:'block', marginTop:4, fontSize:12 }}>
              ← real photo clips through type here
            </span>
          </div>

          {/* Positioning statement */}
          <div style={{ fontSize:14, color: T.inkMid, lineHeight:1.65, maxWidth:400 }}>
            Senior experimentation and conversion leader with 20+ years
            bridging UX, data, and engineering — designing programs that
            turn hypotheses into measurable growth.
          </div>
        </div>

        {/* RIGHT: photo placeholder */}
        <div style={{ flex:'0 0 200px', height:280, borderRadius:2, overflow:'hidden',
          position:'relative' }} className="hatch">
          <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column',
            alignItems:'center', justifyContent:'center', gap:6 }}>
            <div style={{ width:48, height:48, borderRadius:'50%',
              background:'rgba(0,0,0,0.08)' }} />
            <span style={{ fontFamily: T.mono, fontSize:9, color: T.inkLight,
              textAlign:'center', lineHeight:1.6 }}>editorial<br/>portrait<br/>placeholder</span>
          </div>
        </div>

        <span className="anno" style={{ position:'absolute', right:24, top:20 }}>
          photo right-aligned,<br/>bleeds slightly
        </span>
      </section>

      {/* SELECTED WORK */}
      <section style={{ padding:'28px 32px', borderBottom:`1px solid ${T.border}` }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18 }}>
          <Label>Selected Work</Label>
          <span className="anno">each row = case study link</span>
        </div>
        {[
          { n:'01', title:'Checkout Form Optimization', tag:'CRO · A/B Testing', yr:'2023', metric:'+18% CVR' },
          { n:'02', title:'AI Production Systems', tag:'AI Systems · Automation', yr:'2025', metric:'82% time reduction' },
          { n:'03', title:'Usability Research Programme', tag:'ResearchOps · UX', yr:'2019–22', metric:'1,000+ tests' },
          { n:'04', title:'Creative Experimentation at Scale', tag:'Creative · Analytics', yr:'2020–25', metric:'200+ brands' },
          { n:'05', title:'Interactive Experience Platform', tag:'Interaction Design', yr:'2007–10', metric:'Global brands' },
        ].map(w => (
          <div key={w.n} style={{ display:'flex', alignItems:'baseline', gap:16,
            padding:'13px 0', borderBottom:`1px solid ${T.borderMid}` }}>
            <span style={{ fontFamily: T.mono, fontSize:9, color: T.inkLight, minWidth:22 }}>{w.n}</span>
            <span style={{ flex:1, fontSize:16, fontWeight:600, color: T.ink, lineHeight:1.2 }}>{w.title}</span>
            <span style={{ fontFamily: T.mono, fontSize:9, color: T.accent }}>{w.tag}</span>
            <span style={{ fontFamily: T.mono, fontSize:9, color: T.inkLight, minWidth:90, textAlign:'right' }}>{w.metric}</span>
          </div>
        ))}
      </section>

      {/* APPROACH — from B */}
      <section style={{ padding:'28px 32px', borderBottom:`1px solid ${T.border}`,
        display:'flex', gap:32 }}>
        <div style={{ flex:'0 0 140px' }}>
          <Label style={{ marginBottom:8 }}>Approach</Label>
          <span className="anno" style={{ display:'block', marginTop:4 }}>links to full Method page</span>
        </div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:22, fontWeight:600, color: T.ink, lineHeight:1.2, marginBottom:12 }}>
            Every project has a hypothesis.<br />
            Every hypothesis has a test.<br />
            Every test has a lesson.
          </div>
          <div style={{ fontSize:12, color: T.inkMid, lineHeight:1.8, fontFamily: T.mono }}>
            Hypothesis formation → Instrumentation → Test design → Synthesis → Ship &amp; measure
          </div>
        </div>
      </section>

      {/* SKILLS */}
      <section style={{ padding:'24px 32px', borderBottom:`1px solid ${T.border}` }}>
        <Label style={{ marginBottom:14 }}>Core Skills</Label>
        <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
          {['Experimentation Strategy','A/B & Multivariate Testing','CRO / RPV',
            'Funnel Optimization','UX Research','UX Writing / Microcopy',
            'HTML · CSS · JS · React','Figma / Adobe XD','AI Systems Design',
            'Prompt Engineering','Cross-functional Leadership','Design Systems'].map(s => (
            <Tag key={s}>{s}</Tag>
          ))}
        </div>
        <span className="anno" style={{ display:'block', marginTop:8 }}>tags can filter work above</span>
      </section>

      {/* NUMBERS ROW */}
      <section style={{ padding:'24px 32px', borderBottom:`1px solid ${T.border}`,
        display:'flex', gap:40 }}>
        {[['20+','years'],['1,000+','usability tests'],['82%','production time saved'],['200+','brands']].map(([n,l]) => (
          <div key={n}>
            <div style={{ fontSize:32, fontWeight:700, color: T.ink, lineHeight:1, letterSpacing:'-0.02em' }}>{n}</div>
            <div style={{ fontSize:10, color: T.inkLight, fontFamily: T.mono, marginTop:3 }}>{l}</div>
          </div>
        ))}
        <span className="anno" style={{ alignSelf:'center' }}>credibility anchors</span>
      </section>

      {/* FOOTER */}
      <section style={{ padding:'20px 32px', display:'flex', justifyContent:'space-between',
        alignItems:'center' }}>
        <span style={{ fontFamily: T.mono, fontSize:9, color: T.inkLight }}>Gene Davis · Santa Monica, CA</span>
        <div style={{ display:'flex', gap:16 }}>
          {['LinkedIn','GitHub','Resume'].map(l => (
            <span key={l} style={{ fontFamily: T.mono, fontSize:9, color: T.accent,
              borderBottom:`1px solid ${T.accent}` }}>{l} ↗</span>
          ))}
        </div>
      </section>

    </div>
  );
}

/* ─────────────────────────────────────────────
   OPTION B — "Name as Architecture"
   Name is structural — extreme scale, reads as
   both identity and layout element. Photo sits
   inside the letterforms zone. More editorial.
───────────────────────────────────────────── */
function OptionB() {
  return (
    <div style={{ width:'100%', height:'100%', background: T.bg, overflowY:'auto',
      color: T.ink, fontFamily: T.head }}>

      {/* NAV — very sparse */}
      <nav style={{ display:'grid', gridTemplateColumns:'1fr auto 1fr',
        alignItems:'center', padding:'14px 28px',
        borderBottom:`1px solid ${T.border}` }}>
        <div style={{ fontFamily: T.mono, fontSize:9, color: T.inkLight, letterSpacing:'0.1em' }}>
          Santa Monica, CA
        </div>
        <div style={{ fontFamily: T.mono, fontSize:9, color: T.accent,
          letterSpacing:'0.15em', textAlign:'center' }}>
          GENE DAVIS
        </div>
        <div style={{ display:'flex', gap:20, justifyContent:'flex-end' }}>
          {['Work','Method','About'].map(n => (
            <span key={n} style={{ fontSize:10, color: T.inkMid }}>{n}</span>
          ))}
        </div>
      </nav>

      {/* HERO — extreme type scale with photo inset */}
      <section style={{ padding:'24px 28px 20px', borderBottom:`1px solid ${T.border}`,
        position:'relative' }}>

        {/* Status pill */}
        <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:16 }}>
          <div style={{ width:6, height:6, borderRadius:'50%', background:'#22c55e' }} />
          <span style={{ fontFamily: T.mono, fontSize:9, color: T.inkLight, letterSpacing:'0.1em' }}>
            AVAILABLE FOR WORK · MAY 2026
          </span>
        </div>

        {/* NAME — huge, positioned as layout */}
        <div style={{ position:'relative' }}>
          <div style={{ fontFamily: T.head, fontWeight:700, fontSize:88,
            lineHeight:0.88, letterSpacing:'-0.04em', color: T.ink,
            textTransform:'uppercase', userSelect:'none' }}>
            Gene<br />
            <span style={{ position:'relative' }}>
              Davis
              {/* Photo cutout sits inside the name */}
              <div style={{
                position:'absolute', top:'-10px', right:'-20px',
                width:120, height:140, borderRadius:2, overflow:'hidden',
              }} className="hatch">
                <div style={{ position:'absolute', inset:0, display:'flex',
                  flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
                  <div style={{ width:36, height:36, borderRadius:'50%',
                    background:'rgba(0,0,0,0.1)', marginBottom:4 }} />
                  <span style={{ fontFamily: T.mono, fontSize:8, color: T.inkLight,
                    textAlign:'center', lineHeight:1.5 }}>photo<br/>here</span>
                </div>
              </div>
            </span>
          </div>
          <span className="anno" style={{ position:'absolute', right:150, top:60 }}>
            photo overlaps letterform →
          </span>
        </div>

        {/* Title line below name */}
        <div style={{ marginTop:16, display:'flex', gap:16, alignItems:'center' }}>
          <div style={{ width:24, height:1, background: T.accent }} />
          <div style={{ fontSize:12, color: T.inkMid, letterSpacing:'0.06em' }}>
            EXPERIMENTATION SPECIALIST · UX LEADER · AI SYSTEMS
          </div>
        </div>

        {/* Positioning statement */}
        <div style={{ marginTop:14, fontSize:14, color: T.inkMid, lineHeight:1.65,
          maxWidth:460 }}>
          Designing disciplined experimentation programs that identify friction,
          translate behavioral insight, and ship measurable growth — for 20+ years.
        </div>
      </section>

      {/* WORK INDEX */}
      <section style={{ padding:'24px 28px', borderBottom:`1px solid ${T.border}` }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:14 }}>
          <Label>Work</Label>
          <span style={{ fontFamily: T.mono, fontSize:9, color: T.inkLight }}>5 projects</span>
        </div>
        {[
          { n:'01', title:'Checkout Form Optimization', sub:'Hypothesis-led A/B testing across multi-step form flows', tag:'CRO', yr:'2023' },
          { n:'02', title:'AI Production Systems Design', sub:'Proprietary automation reducing production time 82%', tag:'AI', yr:'2025' },
          { n:'03', title:'Research Operations Programme', sub:'1,000+ usability tests across 9 years', tag:'Research', yr:'2022' },
          { n:'04', title:'Creative Experimentation at Scale', sub:'Triple-digit CTOR lift across 200+ brand campaigns', tag:'Creative', yr:'2024' },
        ].map(w => (
          <div key={w.n} style={{ display:'flex', gap:14, padding:'11px 0',
            borderBottom:`1px solid ${T.borderMid}`, alignItems:'flex-start' }}>
            <span style={{ fontFamily: T.mono, fontSize:9, color: T.inkLight,
              minWidth:20, paddingTop:2 }}>{w.n}</span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:15, fontWeight:600, color: T.ink, marginBottom:3 }}>{w.title}</div>
              <div style={{ fontSize:11, color: T.inkMid, lineHeight:1.5 }}>{w.sub}</div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:3 }}>
              <Tag>{w.tag}</Tag>
              <span style={{ fontFamily: T.mono, fontSize:8, color: T.inkLight }}>{w.yr}</span>
            </div>
          </div>
        ))}
      </section>

      {/* APPROACH */}
      <section style={{ padding:'24px 28px', borderBottom:`1px solid ${T.border}`,
        background: T.surface, backdropFilter:'blur(8px)' }}>
        <Label style={{ marginBottom:12 }}>Approach</Label>
        <div style={{ fontSize:20, fontWeight:600, color: T.ink, lineHeight:1.25, marginBottom:12 }}>
          Rigor by habit,<br />not ceremony.
        </div>
        <div style={{ display:'flex', gap:0 }}>
          {['Hypothesize','Instrument','Test','Synthesize','Ship'].map((s, i, arr) => (
            <div key={s} style={{ display:'flex', alignItems:'center' }}>
              <span style={{ fontFamily: T.mono, fontSize:9, color: T.inkMid,
                padding:'5px 10px', border:`1px solid ${T.border}`,
                background:'rgba(255,255,255,0.6)', borderRadius:2 }}>{s}</span>
              {i < arr.length - 1 && (
                <span style={{ fontFamily: T.mono, fontSize:9, color: T.inkLight, padding:'0 4px' }}>→</span>
              )}
            </div>
          ))}
        </div>
      </section>

      {/* SKILLS + NUMBERS */}
      <section style={{ padding:'20px 28px', display:'flex', gap:32,
        borderBottom:`1px solid ${T.border}` }}>
        <div style={{ flex:1 }}>
          <Label style={{ marginBottom:10 }}>Skills</Label>
          <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
            {['Experimentation Strategy','A/B / MVT','CRO · RPV','Funnel UX',
              'UX Research','Microcopy','HTML·CSS·JS','React','AI Systems',
              'Figma','Design Systems','Data Viz'].map(s => <Tag key={s}>{s}</Tag>)}
          </div>
        </div>

            <div key={n} style={{ display:'flex', gap:6, alignItems:'baseline' }}>
              <span style={{ fontSize:20, fontWeight:700, color: T.ink }}>{n}</span>
              <span style={{ fontFamily: T.mono, fontSize:9, color: T.inkLight }}>{l}</span>
            </div>
          ))}
        </div>
      </section>

    </div>
  );
}

/* ─────────────────────────────────────────────
   OPTION C — "Terminal Accent / Editorial Body"
   Light bg, but monospace is used as editorial
   accent (not dominant). Full-bleed chapter
   dividers. More typographic rhythm.
───────────────────────────────────────────── */
function OptionC() {
  return (
    <div style={{ width:'100%', height:'100%', background: T.bg, overflowY:'auto',
      color: T.ink, fontFamily: T.head }}>

      {/* NAV — minimal left mark + right links */}
      <nav style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'14px 32px', borderBottom:`1px solid ${T.border}` }}>
        <div>
          <div style={{ fontFamily: T.head, fontWeight:700, fontSize:13,
            letterSpacing:'0.02em' }}>Gene Davis</div>
          <div style={{ fontFamily: T.mono, fontSize:8, color: T.accent,
            letterSpacing:'0.12em' }}>EXPERIMENTATION · UX · AI</div>
        </div>
        <div style={{ display:'flex', gap:24, alignItems:'center' }}>
          {['Work','Method','About'].map(n => (
            <span key={n} style={{ fontSize:11, color: T.inkMid }}>{n}</span>
          ))}
          <span style={{ fontFamily: T.mono, fontSize:9, color:'#fff',
            background: T.accent, padding:'5px 12px', letterSpacing:'0.08em' }}>
            HIRE ME
          </span>
        </div>
      </nav>

      {/* HERO — name + photo side-by-side, statement below */}
      <section style={{ padding:'32px 32px 28px', borderBottom:`1px solid ${T.border}` }}>
        <div style={{ display:'flex', gap:28, alignItems:'flex-start' }}>

          {/* Photo — left, editorial crop */}
          <div style={{ flex:'0 0 160px', height:200, borderRadius:2 }} className="hatch">
            <div style={{ height:'100%', display:'flex', flexDirection:'column',
              alignItems:'center', justifyContent:'center', gap:6 }}>
              <div style={{ width:40, height:40, borderRadius:'50%',
                background:'rgba(0,0,0,0.08)' }} />
              <span style={{ fontFamily: T.mono, fontSize:8, color: T.inkLight,
                textAlign:'center', lineHeight:1.6 }}>portrait<br/>photo</span>
            </div>
          </div>

          <div style={{ flex:1 }}>
            {/* Name — large */}
            <div style={{ fontFamily: T.head, fontWeight:700, fontSize:52,
              letterSpacing:'-0.03em', lineHeight:0.92, color: T.ink, marginBottom:14,
              textTransform:'uppercase' }}>
              Gene<br />Davis
            </div>

            {/* Descriptor */}
            <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:14 }}>
              <div style={{ width:20, height:1, background: T.accent }} />
              <span style={{ fontFamily: T.mono, fontSize:9, color: T.inkMid,
                letterSpacing:'0.1em' }}>
                SENIOR UX · EXPERIMENTATION SPECIALIST · AI SYSTEMS
              </span>
            </div>

            {/* MASKED TEXT — "EXPERIMENT" with gradient-photo treatment */}
            <div style={{
              fontFamily: T.head, fontWeight:700, fontSize:44,
              letterSpacing:'-0.03em', lineHeight:0.9, display:'inline-block',
              background:'linear-gradient(110deg, #3b82f6 0%, #1e40af 50%, #312e81 100%)',
              WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
              backgroundClip:'text', marginBottom:14,
            }}>
              EXPERIMENT
            </div>
            <span className="anno" style={{ display:'block', fontSize:11, marginTop:2 }}>
              ← word has your photo clipped through it in production
            </span>

            <div style={{ fontSize:13, color: T.inkMid, lineHeight:1.65, maxWidth:400, marginTop:8 }}>
              20+ years of structured experimentation — from Flash-era interaction design
              to AI-accelerated CRO. I design programs, not just pages.
            </div>
          </div>
        </div>
      </section>

      {/* CHAPTER DIVIDER — full-bleed */}
      <div style={{ background: T.ink, padding:'10px 32px', display:'flex',
        justifyContent:'space-between', alignItems:'center' }}>

        <div style={{ display:'flex', gap:4 }}>

      {/* WORK */}
      <section style={{ padding:'20px 32px', borderBottom:`1px solid ${T.border}` }}>

          { n:'04', title:'Creative Experimentation Scale', tag:'Creative', metric:'200+ brands', yr:'2024' },

          <div key={w.n} style={{ display:'flex', alignItems:'center', gap:14,
            padding:'11px 0', borderBottom:`1px solid ${T.borderMid}` }}>
            <span style={{ fontFamily: T.mono, fontSize:8, color: T.inkLight, minWidth:20 }}>{w.n}</span>
            <span style={{ flex:1, fontSize:15, fontWeight:600, color: T.ink }}>{w.title}</span>
            <span style={{ fontFamily: T.mono, fontSize:9, color: T.accent }}>{w.tag}</span>
            <span style={{ fontFamily: T.mono, fontSize:9, color:'#16a34a', minWidth:80, textAlign:'right' }}>{w.metric}</span>
            <span style={{ fontFamily: T.mono, fontSize:8, color: T.inkLight }}>{w.yr}</span>
          </div>
        ))}
      </section>

      {/* CHAPTER DIVIDER */}
      <div style={{ background: T.ink, padding:'10px 32px', display:'flex',
        justifyContent:'space-between', alignItems:'center' }}>
        <span style={{ fontFamily: T.mono, fontSize:9, color:'rgba(255,255,255,0.4)',
          letterSpacing:'0.12em' }}>APPROACH</span>
      </div>

      {/* APPROACH */}
      <section style={{ padding:'24px 32px', borderBottom:`1px solid ${T.border}`,
        display:'flex', gap:32 }}>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:22, fontWeight:600, color: T.ink, lineHeight:1.2, marginBottom:10 }}>
            Every project has a hypothesis.<br />
            Every hypothesis has a test.<br />
            Every test has a lesson.
          </div>
          <div style={{ fontSize:11, color: T.inkMid, lineHeight:1.8, fontFamily: T.mono }}>
            Hypothesis → Instrument → Test → Synthesize → Ship
          </div>
        </div>
        <div style={{ flex:'0 0 160px' }} className="hatch">
          <div style={{ height:100, display:'flex', alignItems:'center',
            justifyContent:'center' }}>
            <span style={{ fontFamily: T.mono, fontSize:8, color: T.inkLight,
              textAlign:'center', lineHeight:1.6 }}>process<br/>diagram</span>
          </div>
        </div>
      </section>

      {/* SKILLS + NUMBERS — combined */}
      <section style={{ padding:'20px 32px', display:'flex', gap:32 }}>
        <div style={{ flex:1 }}>
          <Label style={{ marginBottom:10 }}>Skills</Label>
          <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
            {['Experimentation Strategy','A/B · MVT','CRO · RPV','Funnel UX',
              'UX Research','UX Writing','HTML·CSS·JS','React','AI Systems',
              'Prompt Engineering','Design Systems','Data Viz (Tableau)'].map(s => <Tag key={s}>{s}</Tag>)}
          </div>
        </div>
        <div style={{ flex:'0 0 120px', borderLeft:`1px solid ${T.border}`, paddingLeft:24,
          display:'flex', flexDirection:'column', gap:14 }}>
          <Label>Signal</Label>
          {[['20+','years'],['1k+','tests'],['82%','time saved']].map(([n,l]) => (
            <div key={n}>
              <div style={{ fontSize:24, fontWeight:700, color: T.ink, lineHeight:1 }}>{n}</div>
              <div style={{ fontFamily: T.mono, fontSize:8, color: T.inkLight }}>{l}</div>
            </div>
          ))}
        </div>
      </section>

    </div>
  );
}

/* ─────────────────────────────────────────────
   CANVAS WRAPPER
───────────────────────────────────────────── */
const canvasBg = {
  minHeight: '100vh',
  background: '#1a1a1a',
  padding: '40px 32px 80px',
  fontFamily: "'Space Grotesk', sans-serif",
};

const sectionWrap = { marginBottom: 60 };

const sectionTitle = {
  fontFamily: "'IBM Plex Mono', monospace",
  fontSize: 10,
  color: 'rgba(255,255,255,0.3)',
  letterSpacing: '0.14em',
  textTransform: 'uppercase',
  marginBottom: 16,
  paddingLeft: 4,
};

const artboardRow = {
  display: 'flex',
  gap: 32,
  alignItems: 'flex-start',
  overflowX: 'auto',
  paddingBottom: 8,
};

const BOARD_W = 680;
const BOARD_H = 720;

function Artboard({ label, children, anno }) {
  return (
    <div style={{ flexShrink: 0 }}>
      <div style={{ marginBottom: 8, display:'flex', alignItems:'center', gap:10 }}>
        <span style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11,
          color:'rgba(255,255,255,0.6)', fontWeight:500 }}>{label}</span>
        {anno && <span className="anno" style={{ color:'rgba(100,180,255,0.6)', fontSize:11 }}>{anno}</span>}
      </div>
      <div style={{ width: BOARD_W, height: BOARD_H, borderRadius: 4, overflow:'hidden',
        boxShadow:'0 4px 24px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.3)' }}>
        {children}
      </div>
    </div>
  );
}

/* Tweaks panel */
function TweaksPanel({ visible, onClose, tweaks, setTweak }) {
  if (!visible) return null;
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:100,
      background:'#fff', border:'1px solid rgba(0,0,0,0.12)', borderRadius:8,
      padding:'16px', width:220, boxShadow:'0 8px 32px rgba(0,0,0,0.2)',
      fontFamily:"'Space Grotesk',sans-serif" }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
        <span style={{ fontWeight:600, fontSize:13, color:'#1a1917' }}>Tweaks</span>
        <button onClick={onClose} style={{ border:'none', background:'none',
          cursor:'pointer', fontSize:16, color:'#888', lineHeight:1 }}>×</button>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
        <div>
          <label style={{ fontSize:10, color:'#888', display:'block', marginBottom:4,
            fontFamily:"'IBM Plex Mono',monospace", letterSpacing:'0.08em' }}>
            ACCENT COLOR
          </label>
          <div style={{ display:'flex', gap:6 }}>
            {['oklch(48% 0.20 222)','oklch(48% 0.20 160)','oklch(48% 0.18 30)'].map((c,i) => (
              <div key={c} onClick={() => setTweak('accent', c)}
                style={{ width:24, height:24, borderRadius:4,
                  background:c === 'oklch(48% 0.20 222)' ? '#2563eb' :
                             c === 'oklch(48% 0.20 160)' ? '#16a34a' : '#ea580c',
                  cursor:'pointer', border: tweaks.accent===c ? '2px solid #000' : '2px solid transparent' }} />
            ))}
          </div>
        </div>
        <div>
          <label style={{ fontSize:10, color:'#888', display:'block', marginBottom:4,
            fontFamily:"'IBM Plex Mono',monospace", letterSpacing:'0.08em' }}>
            MASKED WORD
          </label>
          {['EXPERIENCE','EXPERIMENT','DESIGN'].map(w => (
            <label key={w} style={{ display:'flex', alignItems:'center', gap:6,
              fontSize:11, color:'#444', cursor:'pointer', marginBottom:3 }}>
              <input type="radio" name="word" checked={tweaks.heroWord===w}
                onChange={() => setTweak('heroWord', w)} />
              {w}
            </label>
          ))}
        </div>
        <div>
          <label style={{ fontSize:10, color:'#888', display:'block', marginBottom:4,
            fontFamily:"'IBM Plex Mono',monospace", letterSpacing:'0.08em' }}>
            PHOTO PLACEMENT
          </label>
          {['right','left','overlay'].map(p => (
            <label key={p} style={{ display:'flex', alignItems:'center', gap:6,
              fontSize:11, color:'#444', cursor:'pointer', marginBottom:3 }}>
              <input type="radio" name="photo" checked={tweaks.photoPos===p}
                onChange={() => setTweak('photoPos', p)} />
              {p}
            </label>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaksState] = React.useState({
    accent: 'oklch(48% 0.20 222)',
    heroWord: 'EXPERIENCE',
    photoPos: 'right',
  });
  const [tweaksVisible, setTweaksVisible] = React.useState(false);

  const setTweak = (k, v) => setTweaksState(s => ({ ...s, [k]: v }));

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  return (
    <div style={canvasBg}>
      {/* Header */}
      <div style={{ marginBottom:32 }}>
        <div style={{ fontFamily:"'Space Grotesk',sans-serif", fontSize:18, fontWeight:600,
          color:'rgba(255,255,255,0.85)', marginBottom:4 }}>
          Gene Davis — Portfolio Direction v2
        </div>
        <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:10,
          color:'rgba(255,255,255,0.35)', letterSpacing:'0.1em' }}>
          3 HOMEPAGE DIRECTIONS · LIGHT BG · PHOTO + MASKED TYPE HERO
        </div>
      </div>

      {/* Artboards */}
      <div style={sectionWrap}>
        <div style={sectionTitle}>Homepage Directions — scroll right to compare</div>
        <div style={artboardRow}>
          <Artboard label="A — Masked Hero + Scroll" anno="name large, key word photo-clipped">
            <OptionA />
          </Artboard>
          <Artboard label="B — Name as Architecture" anno="extreme scale, photo overlaps letterform">
            <OptionB />
          </Artboard>
          <Artboard label="C — Editorial + Chapter Dividers" anno="dark dividers as section headers">
            <OptionC />
          </Artboard>
        </div>
      </div>

      {/* Notes */}
      <div style={{ maxWidth:680, marginTop:16, padding:'16px 20px',
        background:'rgba(255,255,255,0.04)', borderRadius:6,
        border:'1px solid rgba(255,255,255,0.08)' }}>
        <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:9,
          color:'rgba(255,255,255,0.3)', letterSpacing:'0.1em', marginBottom:8 }}>
          DESIGN NOTES
        </div>
        <div style={{ fontSize:12, color:'rgba(255,255,255,0.5)', lineHeight:1.8 }}>
          • <strong style={{ color:'rgba(255,255,255,0.7)' }}>Masked text</strong> — "EXPERIENCE / EXPERIMENT / DESIGN" with your photo clipped through. 100% CSS, no Photoshop needed.<br />
          • <strong style={{ color:'rgba(255,255,255,0.7)' }}>Photo placeholder</strong> — hatched box. Editorial crop (shoulders-up, slightly angled) works best with these layouts.<br />
          • <strong style={{ color:'rgba(255,255,255,0.7)' }}>Terminal accent</strong> — IBM Plex Mono used only for labels, metadata, tags. Not dominant.<br />
          • <strong style={{ color:'rgba(255,255,255,0.7)' }}>Resume integrated</strong> — real job titles, metrics, and skills pulled from your document.
        </div>
      </div>

      <TweaksPanel visible={tweaksVisible} onClose={() => {
        setTweaksVisible(false);
        window.parent.postMessage({ type:'__edit_mode_dismissed' }, '*');
      }} tweaks={tweaks} setTweak={setTweak} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
